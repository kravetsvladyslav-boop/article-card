<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Article Preview Card</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="page">
      <article class="card">
        <img
          class="card__image"
          src="https://picsum.photos/seed/article/600/250"
          alt="Article preview"
        />

        <div class="card__body">
          <h2 class="card__title"><strong>Практична №4</strong></h2>
            <p class="card__description">
            Використовуючи отримані знання з CSS flexbox і grid реалізувати картку статті за наданим дизайном.
            </p>

          <div class="card__footer">
            <div class="card__author">
              <img
                class="card__avatar"
                src=""
                alt=""
              />
              <div class="card__author-info">
                <span class="card__author-name">Кравець Владислав</span>
                <span class="card__author-date">23 квітня 2026</span>
              </div>
            </div>

            <div class="card__share">
              <div class="card__share-popup" id="sharePopup">
                <span class="card__share-label">SHARE</span>
                <a href="#" class="card__share-link" aria-label="Facebook">
                  <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/facebook.svg" alt="Facebook" />
                </a>
                <a href="#" class="card__share-link" aria-label="Twitter">
                  <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/x.svg" alt="Twitter" />
                </a>
                <a href="#" class="card__share-link" aria-label="Pinterest">
                  <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/pinterest.svg" alt="Pinterest" />
                </a>
              </div>
              <button class="card__share-btn" id="shareBtn" aria-label="Share">
                <svg xmlns="http://www.w3.org/2000/svg" width="15" height="13">
                  <path d="M15 6.495L8.766.014V3.88H7.441C3.33 3.88 0 7.21 0 11.32v1.366l.668-.73c1.381-1.51 3.805-2.38 6.773-2.38h.325v3.864L15 6.495z"/>
                </svg>
              </button>
            </div>
          </div>
        </div>
      </article>
    </main>

    <script src="script.js"></script>
  </body>
</html>
